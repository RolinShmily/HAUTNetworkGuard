name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-qt:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtnetworkauth'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -S Windows -DCMAKE_BUILD_TYPE=Release
        
      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt Runtime
        run: |
          mkdir HAUTNetworkGuard-Windows
          copy build\Release\HAUTNetworkGuard.exe HAUTNetworkGuard-Windows\
          windeployqt HAUTNetworkGuard-Windows\HAUTNetworkGuard.exe --release --no-translations --no-opengl-sw

      - name: Create Installer ZIP
        run: Compress-Archive -Path HAUTNetworkGuard-Windows -DestinationPath HAUTNetworkGuard-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: HAUTNetworkGuard-Windows.zip

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS App
        run: |
          cd macOS
          chmod +x build.sh create-dmg.sh
          ./build.sh
          ./create-dmg.sh

      - name: Verify Code Signature
        run: |
          codesign --verify --verbose macOS/build/HAUTNetworkGuard.app
          echo "代码签名验证通过"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: macOS/build/HAUTNetworkGuard.dmg

  release:
    needs: [build-windows-qt, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## HAUTNetworkGuard ${{ steps.get_version.outputs.VERSION }}
            
            河南工业大学校园网自动登录工具
            
            ### 📦 下载
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows** | `HAUTNetworkGuard-Windows.zip` | 解压后运行 `HAUTNetworkGuard.exe` |
            | **macOS** | `HAUTNetworkGuard.dmg` | 双击安装到应用程序 |
            | **OpenWrt** | 一键安装 | `wget -qO- https://raw.githubusercontent.com/yellowpeachxgp/HAUTNetworkGuard/main/OpenWrt/install-online.sh \| sh` |

            ### ⚠️ macOS 用户注意

            首次打开可能提示"无法验证开发者"，解决方法：

            **方法一**: 右键点击应用 → 选择"打开" → 在弹窗中点击"打开"

            **方法二**: 在终端执行：
            ```
            xattr -cr /Applications/HAUTNetworkGuard.app
            ```
            
            ### 🔄 更新内容
            
            详见 [README.md 版本历史](https://github.com/yellowpeachxgp/HAUTNetworkGuard#版本历史)
            
            ---
            
            **首次使用**: 运行后输入学号和密码，勾选"记住密码"和"开机自启动"即可。
          files: |
            HAUTNetworkGuard-Windows.zip
            HAUTNetworkGuard.dmg
