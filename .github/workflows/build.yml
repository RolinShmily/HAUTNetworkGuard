name: Build and Release
run-name: ${{ github.workflow }} · ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-openwrt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3

      - name: Validate OpenWrt Lua Scripts
        run: |
          find OpenWrt/files/usr/lib/haut-network-guard -name '*.lua' -print -exec luac5.3 -p {} \;

      - name: Validate Protocol And Docs Contracts
        run: |
          python3 tests/test_protocol_contract.py
          python3 tests/test_docs_contract.py

      - name: Validate OpenWrt Modules
        run: |
          LUA_PATH="OpenWrt/files/usr/lib/haut-network-guard/?.lua;;" lua5.3 tests/test_openwrt_modules.lua

      - name: Validate OpenWrt Shell Scripts
        run: |
          sh -n OpenWrt/install.sh
          sh -n OpenWrt/install-online.sh
          sh -n OpenWrt/uninstall.sh
          sh -n OpenWrt/uninstall-online.sh
          sh -n OpenWrt/upgrade-online.sh
          sh -n OpenWrt/files/etc/init.d/haut-network-guard

  build-windows-qt:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtnetworkauth'

      - name: Configure CMake
        run: cmake -B build -S Windows -G "Visual Studio 17 2022" -A x64
        
      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Windows Smoke Tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Deploy Qt Runtime
        run: |
          mkdir HAUTNetworkGuard-Windows
          copy build\Release\HAUTNetworkGuard.exe HAUTNetworkGuard-Windows\
          windeployqt HAUTNetworkGuard-Windows\HAUTNetworkGuard.exe --release --no-translations --no-opengl-sw

      - name: Create Installer ZIP
        run: |
          if (Test-Path HAUTNetworkGuard-Windows.zip) {
            Remove-Item HAUTNetworkGuard-Windows.zip -Force
          }
          Compress-Archive -Path HAUTNetworkGuard-Windows -DestinationPath HAUTNetworkGuard-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: HAUTNetworkGuard-Windows.zip
          if-no-files-found: error
          retention-days: 7

  build-macos:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build macOS App
        run: |
          cd macOS
          chmod +x build.sh create-dmg.sh tests/run_smoke_tests.sh
          ./tests/run_smoke_tests.sh
          ./build.sh
          ./create-dmg.sh

      - name: Verify Code Signature
        run: |
          codesign --verify --verbose macOS/build/HAUTNetworkGuard.app
          echo "代码签名验证通过"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: macOS/build/HAUTNetworkGuard.dmg
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [validate-openwrt, build-windows-qt, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows Artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: ./

      - name: Download macOS Artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-build
          path: ./

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## HAUTNetworkGuard ${{ steps.get_version.outputs.VERSION }}
            
            河南工业大学校园网自动登录工具
            
            ### 📦 下载
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows** | `HAUTNetworkGuard-Windows.zip` | 解压后运行 `HAUTNetworkGuard.exe` |
            | **macOS** | `HAUTNetworkGuard.dmg` | 双击安装到应用程序 |
            | **OpenWrt** | 一键安装 | `wget -qO- https://raw.githubusercontent.com/yellowpeachxgp/HAUTNetworkGuard/${{ steps.get_version.outputs.VERSION }}/OpenWrt/install-online.sh \| sh -s -- ${{ steps.get_version.outputs.VERSION }}` |

            ### ⚠️ macOS 用户注意

            首次打开可能提示"无法验证开发者"，解决方法：

            **方法一**: 右键点击应用 → 选择"打开" → 在弹窗中点击"打开"

            **方法二**: 在终端执行：
            ```
            xattr -cr /Applications/HAUTNetworkGuard.app
            ```
            
            ### 🔄 更新内容
            
            详见 [README.md 版本历史](https://github.com/yellowpeachxgp/HAUTNetworkGuard#版本历史)
            
            ---
            
            **首次使用**: 运行后输入学号和密码，勾选"记住密码"和"开机自启动"即可。
          files: |
            HAUTNetworkGuard-Windows.zip
            HAUTNetworkGuard.dmg
